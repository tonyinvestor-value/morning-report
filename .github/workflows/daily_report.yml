name: Daily Morning Report

on:
  schedule:
    # 每天 8:30 UTC = 16:30 北京时间
    - cron: '30 8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate morning report
        run: python3 main.py

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          pip install oss2
          python3 << 'EOF'
          import os
          import glob
          import oss2

          access_key_id = os.environ['OSS_ACCESS_KEY_ID']
          access_key_secret = os.environ['OSS_ACCESS_KEY_SECRET']
          bucket_name = os.environ['OSS_BUCKET']
          endpoint = os.environ['OSS_ENDPOINT']

          print(f"Debug - Bucket: {bucket_name}")
          print(f"Debug - Endpoint: {endpoint}")

          auth = oss2.Auth(access_key_id, access_key_secret)

          # 列出所有 bucket 来排查
          try:
              service = oss2.Service(auth, f'https://oss-{endpoint}.aliyuncs.com')
              buckets = service.list_buckets()
              print("Available buckets:")
              for b in buckets.buckets:
                  print(f"  - {b.name} ({b.region})")
          except Exception as e:
              print(f"List buckets error: {e}")

          # 尝试连接 bucket
          try:
              bucket = oss2.Bucket(auth, f'https://{endpoint}.aliyuncs.com', bucket_name)
              # 测试 bucket 是否存在
              bucket.get_bucket_info()
              print(f"Bucket {bucket_name} exists!")
          except oss2.exceptions.NoSuchBucket:
              print(f"ERROR: Bucket {bucket_name} does not exist!")
              raise
          except Exception as e:
              print(f"Bucket connection error: {e}")
              raise

          # Upload all files in morning_report/
          for filepath in glob.glob('morning_report/*'):
              filename = os.path.basename(filepath)
              bucket.put_object_from_file(filename, filepath)
              print(f'Uploaded: {filename}')

          print('All files uploaded successfully!')
          EOF
