name: Daily Morning Report

on:
  schedule:
    # 每天 8:30 UTC = 16:30 北京时间
    - cron: '30 8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate morning report
        run: python3 main.py

      - name: Upload to OSS
        uses: manyunyu/aliyun-oss-action@v1.0.0
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          bucket-name: ${{ secrets.ALIYUN_OSS_BUCKET }}
          region: ${{ secrets.ALIYUN_OSS_REGION }}
          endpoint: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          source-dir: 'morning_report/'
          target-dir: ''
