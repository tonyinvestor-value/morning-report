name: Daily Morning Report

on:
  schedule:
    # 每天 0:30 UTC = 8:30 北京时间
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate morning report
        run: python3 main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add morning_report/
          git diff --staged --quiet || git commit -m "📊 更新投资晨报 $(date +\%Y\%m\%d)"
          git push origin main

      - name: Upload to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          pip install oss2
          python3 << 'EOF'
          import os
          import glob
          import oss2

          access_key_id = os.environ['OSS_ACCESS_KEY_ID']
          access_key_secret = os.environ['OSS_ACCESS_KEY_SECRET']
          bucket_name = os.environ['OSS_BUCKET']
          endpoint = os.environ['OSS_ENDPOINT']

          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, f'https://{endpoint}.aliyuncs.com', bucket_name)

          # Upload all files in morning_report/
          for filepath in glob.glob('morning_report/*'):
              filename = os.path.basename(filepath)
              bucket.put_object_from_file(filename, filepath)
              print(f'Uploaded: {filename}')

          print('All files uploaded successfully!')
          EOF
