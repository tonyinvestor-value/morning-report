name: Daily Morning Report

on:
  schedule:
    # 每天 0:30 UTC = 8:30 北京时间
    - cron: '30 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate morning report
        run: python3 main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add morning_report/ index.html
          git diff --staged --quiet || git commit -m "📊 更新投资晨报 $(date +\%Y\%m\%d)"
          git push origin main

      - name: Upload to OSS (可选，保留备份)
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_REGION }}
        run: |
          pip install oss2
          python3 << 'EOF'
          import os
          import glob
          import oss2

          access_key_id = os.environ.get('OSS_ACCESS_KEY_ID')
          access_key_secret = os.environ.get('OSS_ACCESS_KEY_SECRET')
          bucket_name = os.environ.get('OSS_BUCKET')
          endpoint = os.environ.get('OSS_ENDPOINT')

          if not all([access_key_id, access_key_secret, bucket_name, endpoint]):
              print("OSS credentials not configured, skipping OSS upload")
              exit(0)

          auth = oss2.Auth(access_key_id, access_key_secret)
          bucket = oss2.Bucket(auth, f'https://{endpoint}.aliyuncs.com', bucket_name)

          for filepath in glob.glob('morning_report/*'):
              filename = os.path.basename(filepath)
              bucket.put_object_from_file(filename, filepath)
              print(f'Uploaded to OSS: {filename}')

          print('OSS upload completed!')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'index.html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
